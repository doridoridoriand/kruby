name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Validate release metadata
        run: scripts/release/check --tag "${GITHUB_REF_NAME}" --require-empty-unreleased

      - name: Render release notes
        run: scripts/release/notes --tag "${GITHUB_REF_NAME}" > release-notes.md

      - name: Build gem artifact
        working-directory: kubernetes
        run: |
          rm -f kruby-*.gem
          gem build kubernetes.gemspec

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="kubernetes/kruby-${version}.gem"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "kruby ${version}" \
              --notes-file release-notes.md
            gh release upload "${GITHUB_REF_NAME}" "${asset}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${asset}" \
              --verify-tag \
              --title "kruby ${version}" \
              --notes-file release-notes.md
          fi
